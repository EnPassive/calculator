<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>理性財務自由 - 每月定期定額與通膨計算機</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- 基礎版面設計 --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft JhengHei';
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 20px auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .header {
            text-align: center;
            border-bottom: 2px solid #1e3a8a;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        .header h2 { color: #1e3a8a; margin: 0; font-size: 24px; }

        /* --- 輸入區域設計 --- */
        .input-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .input-box { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 8px; color: #475569; font-size: 13px; }
        input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 5px; font-size: 16px; outline: none; }
        
        /* 醒目提示輸入框 */
        .monthly-box input { border: 2px solid #3b82f6; background-color: #eff6ff; }
        .target-box input { border: 2px solid #f59e0b; background-color: #fffbeb; }

        button {
            width: 100%; background-color: #1e3a8a; color: white; border: none; padding: 15px;
            font-size: 18px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-bottom: 20px;
        }
        button:hover { background-color: #1e40af; }
        
        /* --- 診斷報告區 --- */
        #summaryBox {
            display: none; background-color: #f8fafc; border-left: 5px solid #1e3a8a;
            padding: 20px; margin-bottom: 30px; border-radius: 4px; font-size: 16px; line-height: 1.8;
        }
        .success-text { color: #16a34a; font-weight: bold; }
        .warning-text { color: #dc2626; font-weight: bold; }

        /* --- 圖表與表格 --- */
        .charts-wrapper { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 30px; }
        .chart-container { flex: 1; min-width: 300px; height: 350px; display: none; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #e2e8f0; padding: 10px; text-align: center; }
        th { background-color: #1e3a8a; color: white; }
        .badge-target { background-color: #fef3c7; color: #d97706; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .badge-freedom { background-color: #dcfce7; color: #15803d; padding: 4px 8px; border-radius: 4px; font-weight: bold; }

        /* --- 🛡️ 懶人防盜 CSS --- */
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        input { -webkit-user-select: text; user-select: text; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>📈 理性財務自由 - 複利與通膨綜合試算</h2>
            <p style="color: #64748b; margin-top: 5px;">精算您的「達標日」與「真實自由日」</p>
        </div>

        <div class="input-group">
            <div class="input-box monthly-box">
                <label>💰 每月月初投入 (萬)</label>
                <input type="number" id="monthlyInvest" value="5" step="0.1">
            </div>
            <div class="input-box">
                <label>預計年化報酬率 (%)</label>
                <input type="number" id="annualReturn" value="10" step="0.1">
            </div>
            <div class="input-box">
                <label>試算年限 (年)</label>
                <input type="number" id="years" value="20">
            </div>
            <div class="input-box target-box">
                <label>🎯 目標月收 (萬)</label>
                <input type="number" id="targetIncome" value="10" step="0.5">
            </div>
            <div class="input-box">
                <label>年通膨率 (%)</label>
                <input type="number" id="inflationRate" value="2.5" step="0.1">
            </div>
            <div class="input-box">
                <label>目前月生活費 (萬)</label>
                <input type="number" id="monthlyCost" value="5" step="0.1">
            </div>
        </div>
        
        <button onclick="calculate()">🚀 啟動綜合財務壓力測試</button>

        <div id="summaryBox"></div>

        <div class="charts-wrapper">
            <div class="chart-container" id="chartBox1"><canvas id="growthChart"></canvas></div>
            <div class="chart-container" id="chartBox2"><canvas id="cashFlowChart"></canvas></div>
        </div>

        <table id="resultTable" style="display:none;">
            <thead>
                <tr>
                    <th>年度</th>
                    <th>累計投入 (萬)</th>
                    <th>期末總資產 (萬)</th>
                    <th>月被動收入 (萬)</th>
                    <th>通膨後生活費 (萬)</th>
                    <th>目標達成</th>
                    <th>財務自由</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        let myGrowthChart = null;
        let myCashFlowChart = null;

        // 🛡️ 懶人防盜：禁止右鍵與快捷鍵
        document.oncontextmenu = function() { return false; };
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67))) {
                return false;
            }
        };

        function calculate() {
            const monthlyInvest = parseFloat(document.getElementById('monthlyInvest').value);
            const annualReturn = parseFloat(document.getElementById('annualReturn').value) / 100;
            const years = parseInt(document.getElementById('years').value);
            const targetIncome = parseFloat(document.getElementById('targetIncome').value);
            const inflationRate = parseFloat(document.getElementById('inflationRate').value) / 100;
            const currentMonthlyCost = parseFloat(document.getElementById('monthlyCost').value);

            const monthlyReturn = annualReturn / 12;
            const tbody = document.querySelector('#resultTable tbody');
            tbody.innerHTML = ''; 

            let cumulativePrincipal = 0, cumulativeTotal = 0;
            const labels = [], principalData = [], totalData = [], passiveIncomeData = [], futureCostData = [];
            let achievedTargetYear = -1, achievedFreedomYear = -1;

            for (let i = 1; i <= years; i++) {
                // 每月滾動複利
                for (let m = 1; m <= 12; m++) {
                    cumulativePrincipal += monthlyInvest;
                    cumulativeTotal = (cumulativeTotal + monthlyInvest) * (1 + monthlyReturn);
                }

                let monthlyPassiveIncome = (cumulativeTotal * annualReturn) / 12;
                let futureMonthlyCost = currentMonthlyCost * Math.pow(1 + inflationRate, i);

                if (monthlyPassiveIncome >= targetIncome && achievedTargetYear === -1) achievedTargetYear = i;
                if (monthlyPassiveIncome >= futureMonthlyCost && achievedFreedomYear === -1) achievedFreedomYear = i;

                labels.push(`第 ${i} 年`);
                principalData.push(cumulativePrincipal.toFixed(2));
                totalData.push(cumulativeTotal.toFixed(2));
                passiveIncomeData.push(monthlyPassiveIncome.toFixed(2));
                futureCostData.push(futureMonthlyCost.toFixed(2));

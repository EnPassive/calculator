<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>理性財務自由 - 複利與通膨計算機</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft JhengHei';
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 20px auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .header {
            text-align: center;
            border-bottom: 2px solid #1e3a8a;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        .header h2 {
            color: #1e3a8a;
            margin: 0;
            font-size: 24px;
        }
        /* 輸入區域網格設計 */
        .input-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .input-box {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #475569;
            font-size: 14px;
        }
        input {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 5px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #1e3a8a;
        }
        button {
            width: 100%;
            background-color: #1e3a8a;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-bottom: 20px;
        }
        button:hover {
            background-color: #1e40af;
        }
        
        /* 診斷警語框 */
        #summaryBox {
            display: none;
            background-color: #fffbeb;
            border-left: 5px solid #f59e0b;
            padding: 15px 20px;
            margin-bottom: 30px;
            border-radius: 4px;
            font-size: 16px;
            line-height: 1.6;
            color: #92400e;
        }

        /* 雙圖表並排（電腦版） */
        .charts-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-container {
            flex: 1;
            min-width: 300px;
            position: relative;
            height: 350px;
            display: none; /* 初始隱藏 */
            background: #fdfdfd;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            margin-top: 10px;
            font-size: 14px;
        }
        th, td {
            border: 1px solid #e2e8f0;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #1e3a8a;
            color: white;
            font-weight: 500;
        }
        td:first-child {
            font-weight: bold;
            color: #475569;
        }
        .highlight-income { color: #16a34a; font-weight: bold; } /* 綠色被動收入 */
        .highlight-cost { color: #dc2626; font-weight: bold; }   /* 紅色生活花費 */
        .status-ok { color: #16a34a; font-weight: bold; }
        .status-ng { color: #dc2626; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>📈 理性財務自由 - 複利與通膨雙軌試算系統</h2>
            <p style="color: #64748b; margin-top: 5px;">看清未來現金流的真實購買力，對抗通貨膨脹</p>
        </div>

        <div class="input-group">
            <div class="input-box">
                <label>每月月初投入 (萬)</label>
                <input type="number" id="monthlyInvest" value="5" step="0.1" min="0">
            </div>
            <div class="input-box">
                <label>預計年化報酬率 (%)</label>
                <input type="number" id="annualReturn" value="10" step="0.1" min="0">
            </div>
            <div class="input-box">
                <label>試算年限 (年)</label>
                <input type="number" id="years" value="15" step="1" min="1">
            </div>
            <div class="input-box">
                <label>每年通貨膨脹率 (%)</label>
                <input type="number" id="inflationRate" value="2.5" step="0.1">
            </div>
            <div class="input-box">
                <label>目前每月生活費 (萬)</label>
                <input type="number" id="monthlyCost" value="5" step="0.1" min="0">
            </div>
        </div>
        
        <button onclick="calculate()">🚀 啟動現金流真實壓力測試</button>

        <div id="summaryBox"></div>

        <div class="charts-wrapper">
            <div class="chart-container" id="chartBox1">
                <canvas id="growthChart"></canvas>
            </div>
            <div class="chart-container" id="chartBox2">
                <canvas id="cashFlowChart"></canvas>
            </div>
        </div>

        <table id="resultTable" style="display:none;">
            <thead>
                <tr>
                    <th>年度</th>
                    <th>累計投入本金 (萬)</th>
                    <th>期末總資產 (萬)</th>
                    <th>預估每月被動收入 (萬)</th>
                    <th>通膨後每月生活費 (萬)</th>
                    <th>現金流狀態</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script>
        let myGrowthChart = null;
        let myCashFlowChart = null;

        function calculate() {
            // 取得輸入值
            const monthlyInvest = parseFloat(document.getElementById('monthlyInvest').value);
            const annualReturn = parseFloat(document.getElementById('annualReturn').value) / 100;
            const years = parseInt(document.getElementById('years').value);
            const inflationRate = parseFloat(document.getElementById('inflationRate').value) / 100;
            const currentMonthlyCost = parseFloat(document.getElementById('monthlyCost').value);

            if (isNaN(monthlyInvest) || isNaN(annualReturn) || isNaN(years) || isNaN(inflationRate) || isNaN(currentMonthlyCost)) {
                alert("請確認所有欄位均輸入有效數字！");
                return;
            }

            // 月化報酬率
            const monthlyReturn = annualReturn / 12;

            const tbody = document.querySelector('#resultTable tbody');
            tbody.innerHTML = ''; 

            let cumulativePrincipal = 0; 
            let cumulativeTotal = 0;     

            // 準備圖表資料陣列
            const labels = [];
            const principalData = [];
            const totalData = [];
            const passiveIncomeData = [];
            const futureCostData = [];

            let finalPassiveIncome = 0;
            let finalCost = 0;

            for (let i = 1; i <= years; i++) {
                
                // 1. 資產運算 (改為每月月初投入，執行 12 次)
                for (let m = 1; m <= 12; m++) {
                    cumulativePrincipal += monthlyInvest;
                    let currentMonthProfit = (cumulativeTotal + monthlyInvest) * monthlyReturn;
                    cumulativeTotal = cumulativeTotal + monthlyInvest + currentMonthProfit;
                }

                // 2. 被動收入換算 (以年底總資產乘上預期年化報酬，再除以12個月)
                let monthlyPassiveIncome = (cumulativeTotal * annualReturn) / 12;

                // 3. 通膨生活費換算 (未來成本 = 現在成本 * (1 + 通膨率)^年數)
                let futureMonthlyCost = currentMonthlyCost * Math.pow(1 + inflationRate, i);

                // 儲存最後一年的結果給診斷報告使用
                if (i === years) {
                    finalPassiveIncome = monthlyPassiveIncome;
                    finalCost = futureMonthlyCost;
                }

                // 將數據塞入陣列
                labels.push(`第 ${i} 年`);
                principalData.push(cumulativePrincipal.toFixed(2));
                totalData.push(cumulativeTotal.toFixed(2));
                passiveIncomeData.push(monthlyPassiveIncome.toFixed(2));
                futureCostData.push(futureMonthlyCost.toFixed(2));

                // 判斷財務是否自由 (被動收入 >= 通膨後生活費)
                const isFree = monthlyPassiveIncome >= futureMonthlyCost;
                const statusHtml = isFree ? `<span class="status-ok">✔ 財務自由</span>` : `<span class="status-ng">✘ 尚須努力</span>`;

                // 產生表格列
                const row = `<tr>
                    <td>第 ${i} 年</td>
                    <td>${cumulativePrincipal.toFixed(2)}</td>
                    <td style="font-weight:bold;">${cumulativeTotal.toFixed(2)}</td>
                    <td class="highlight-income">${monthlyPassiveIncome.toFixed(2)}</td>
                    <td class="highlight-cost">${futureMonthlyCost.toFixed(2)}</td>
                    <td>${statusHtml}</td>
                </tr>`;
                
                tbody.insertAdjacentHTML('beforeend', row);
            }
            
            // 顯示所有隱藏區塊
            document.getElementById('resultTable').style.display = 'table';
            document.getElementById('chartBox1').style.display = 'block';
            document.getElementById('chartBox2').style.display = 'block';
            document.getElementById('summaryBox').style.display = 'block';

            // --- 產生「購買力診斷報告」核心 ---
            const realPurchasingPower = finalPassiveIncome / Math.pow(1 + inflationRate, years);
            
            const summaryHtml = `
                <strong>⚠️ CFO 真實購買力診斷報告 (第 ${years} 年)：</strong><br>
                屆時您帳面上的每月被動收入看似高達 <strong>${finalPassiveIncome.toFixed(2)} 萬</strong>。<br>
                但受到每年 ${parseFloat(document.getElementById('inflationRate').value)}% 的通膨蠶食，這筆錢的真實購買力，僅相當於現在的 <strong><span style="color:#dc2626; font-size:18px;">${realPurchasingPower.toFixed(2)} 萬</span></strong> 物資！<br>
                (註：要維持您現在 ${currentMonthlyCost} 萬的生活品質，未來每月需支出高達 ${finalCost.toFixed(2)} 萬)
            `;
            document.getElementById('summaryBox').innerHTML = summaryHtml;

            // 繪製兩張圖表
            renderGrowthChart(labels, principalData, totalData);
            renderCashFlowChart(labels, passiveIncomeData, futureCostData);
        }

        function renderGrowthChart(labels, principalData, totalData) {
            const ctx = document.getElementById('growthChart').getContext('2d');
            if (myGrowthChart) myGrowthChart.destroy();

            myGrowthChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: '累計投入本金 (萬)', data: principalData, borderColor: '#64748b', backgroundColor: 'rgba(100, 116, 139, 0.2)', fill: true, tension: 0.3 },
                        { label: '期末總資產本利和 (萬)', data: totalData, borderColor: '#1e3a8a', backgroundColor: 'rgba(30, 58, 138, 0.1)', fill: true, tension: 0.3 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { title: { display: true, text: '資產成長雪球圖 (總資產)' } }
                }
            });
        }

        function renderCashFlowChart(labels, passiveIncomeData, futureCostData) {
            const ctx = document.getElementById('cashFlowChart').getContext('2d');
            if (myCashFlowChart) myCashFlowChart.destroy();

            myCashFlowChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: '預估每月被動收入 (萬)', data: passiveIncomeData, borderColor: '#16a34a', backgroundColor: '#16a34a', borderWidth: 3, tension: 0.1 },
                        { label: '通膨後所需生活費 (萬)', data: futureCostData, borderColor: '#dc2626', backgroundColor: '#dc2626', borderDash: [5, 5], borderWidth: 2, tension: 0.1 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { title: { display: true, text: '🔥 現金流黃金交叉對決 (每月)' } }
                }
            });
        }
    </script>
</body>
</html>
